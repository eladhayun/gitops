apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drc-trainings
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/eladhayun/gitops.git
    targetRevision: HEAD
    path: trainings
  destination:
    server: https://kubernetes.default.svc
    namespace: trainings
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
