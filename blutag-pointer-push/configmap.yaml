apiVersion: v1
kind: ConfigMap
metadata:
  name: blutag-pointer-push-config
  labels:
    app: blutag-pointer-push
data:
  POINTER_BASE_URL: "https://iot.pointer4u.co.il/iservices/PointerAPI"
  POINTER_PUSH_PATH: "/api/Fleet/ManageRequest"
  # Token cache TTL in seconds (24h). Login is rate-limited to 10/24h by Pointer.
  TOKEN_TTL_SECONDS: "86400"
  # Max locations per Pointer request; larger arrays are split into sequential requests.
  MAX_BATCH_SIZE: "500"
  # Pointer push retry: total attempts (1 = no retries) and exponential-backoff base (seconds)
  # for transient failures (network / HTTP 5xx). Runs in the background so blutag-app isn't blocked.
  MAX_PUSH_ATTEMPTS: "1"
  PUSH_RETRY_BASE_SECONDS: "2"
