apiVersion: apps/v1
kind: Deployment
metadata:
  name: dirtbike-specialist
  labels:
    app: dirtbike-specialist
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: dirtbike-specialist
  template:
    metadata:
      labels:
        app: dirtbike-specialist
    spec:
      containers:
        - name: dirtbike-specialist
          image: prodacr1234.azurecr.io/dirtbike-specialist:main-a7ef553
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secrets
                  key: AZURE_OPENAI_API_KEY
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secrets
                  key: AZURE_OPENAI_ENDPOINT
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              value: "gpt-4o-mini"
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
              value: "text-embedding-3-large"
            - name: POSTGRES_HOST
              value: dirtbike-postgres
            - name: POSTGRES_DB
              value: dirtbike
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: dirtbike-postgres-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dirtbike-postgres-secret
                  key: postgres-password
            - name: BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secrets
                  key: BASIC_AUTH_USERNAME
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secrets
                  key: BASIC_AUTH_PASSWORD
            # Azure AI Document Intelligence (OCR replacement for GCP Document AI)
            - name: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-document-intelligence-secret
                  key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
            - name: AZURE_DOCUMENT_INTELLIGENCE_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-document-intelligence-secret
                  key: AZURE_DOCUMENT_INTELLIGENCE_KEY
            # Azure AI Speech (server-side STT for chat-composer mic).
            # optional=true so the pod still boots if the secret hasn't been
            # created yet — the /api/transcribe handler returns 503 in that case.
            - name: AZURE_SPEECH_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-speech-secret
                  key: AZURE_SPEECH_KEY
                  optional: true
            - name: AZURE_SPEECH_REGION
              valueFrom:
                secretKeyRef:
                  name: azure-speech-secret
                  key: AZURE_SPEECH_REGION
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
