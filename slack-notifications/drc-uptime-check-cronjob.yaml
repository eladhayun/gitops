apiVersion: batch/v1
kind: CronJob
metadata:
  name: drc-uptime-check
  labels:
    app: drc-uptime-check
spec:
  # Every 15 minutes — alerts the DRC channel only when the app is down
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: drc-uptime-check
        spec:
          restartPolicy: Never
          containers:
          - name: drc-uptime-check
            image: prodacr1234.azurecr.io/slack-notifications:main-0ca0a08
            command: ["/root/slack-notifications"]
            args: ["drc-uptime-check"]
            env:
            - name: DRC_HEALTH_URL
              value: "https://drc-trainings.jshipster.io/api/healthz"
            - name: DRC_REPORT_CHANNEL
              value: "C0B93ML2RJQ"
            - name: SLACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-notifications-secrets
                  key: SLACK_TOKEN
            resources:
              requests:
                memory: "16Mi"
                cpu: "5m"
              limits:
                memory: "32Mi"
                cpu: "50m"
