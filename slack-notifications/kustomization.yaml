apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - cronjob.yaml
  - ids-analytics-cronjob.yaml
  - blutag-findmy-status-cronjob.yaml
  - hasadnaa-weekly-summary-cronjob.yaml
  - blutag-weekly-summary-cronjob.yaml
  - pg-backup-report-cronjob.yaml
  - uptime-check-cronjob.yaml
  # DRC (trainings) — backups & uptime are folded into the global per-service
  # fan-out (pg-backup-report / uptime-check); only the business summary is DRC-specific.
  - drc-weekly-summary-cronjob.yaml
  # Dirtbike Specialist — backups & uptime are in the global fan-out; business summary is service-specific.
  - dirtbike-weekly-summary-cronjob.yaml
  - serviceaccount.yaml
  # GCP Billing
  - gcp-billing-cronjob.yaml
  - gcp-serviceaccount.yaml

generators:
  - secrets-generator.yaml
  - gcp-secrets-generator.yaml
