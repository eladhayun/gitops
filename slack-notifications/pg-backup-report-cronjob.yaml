apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup-report
  labels:
    app: pg-backup-report
spec:
  # Run every Monday at 8:30 AM UTC (11:30 AM Israel)
  schedule: "30 8 * * 1"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: pg-backup-report
        spec:
          restartPolicy: OnFailure
          containers:
          - name: pg-backup-report
            image: prodacr1234.azurecr.io/slack-notifications:main-ce25746
            command: ["/root/slack-notifications"]
            args: ["pg-backup-report"]
            env:
            - name: PG_BACKUP_STORAGE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: slack-notifications-secrets
                  key: PG_BACKUP_STORAGE_ACCOUNT
            - name: PG_BACKUP_STORAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: slack-notifications-secrets
                  key: PG_BACKUP_STORAGE_KEY
            # Fallback channel for any DB without a dedicated service channel
            - name: PG_BACKUP_REPORT_CHANNEL
              value: "C09QJ6769QR"
            # Per-service routing: each DB's backup status goes to its own channel
            - name: BLUTAG_APP_REPORT_CHANNEL
              value: "C0A3HT1JXFV"
            - name: HASADNAA_REPORT_CHANNEL
              value: "C0ALLUTTECT"
            - name: IDS_REPORT_CHANNEL
              value: "C09P9CPGAN9"
            - name: DRC_REPORT_CHANNEL
              value: "C0B93ML2RJQ"
            - name: DIRTBIKE_REPORT_CHANNEL
              value: "C0BD40N45UY"
            - name: SLACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-notifications-secrets
                  key: SLACK_TOKEN
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-notifications-secrets
                  key: SLACK_WEBHOOK_URL
            resources:
              requests:
                memory: "16Mi"
                cpu: "5m"
              limits:
                memory: "32Mi"
                cpu: "50m"
