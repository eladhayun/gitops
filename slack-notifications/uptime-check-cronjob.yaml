apiVersion: batch/v1
kind: CronJob
metadata:
  name: uptime-check
  labels:
    app: uptime-check
spec:
  # Run every 5 minutes
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: uptime-check
        spec:
          restartPolicy: Never
          containers:
          - name: uptime-check
            image: prodacr1234.azurecr.io/slack-notifications:main-6ca92c5
            command: ["/root/slack-notifications"]
            args: ["uptime-check"]
            env:
            - name: SLACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-notifications-secrets
                  key: SLACK_TOKEN
            # Per-service routing: each service's down-alert goes to its own channel
            - name: IDS_REPORT_CHANNEL
              value: "C09P9CPGAN9"
            - name: HASADNAA_REPORT_CHANNEL
              value: "C0ALLUTTECT"
            - name: BLUTAG_APP_REPORT_CHANNEL
              value: "C0A3HT1JXFV"
            - name: DRC_REPORT_CHANNEL
              value: "C0B93ML2RJQ"
            - name: DRC_HEALTH_URL
              value: "https://drc-trainings.jshipster.io/api/healthz"
            resources:
              requests:
                memory: "16Mi"
                cpu: "5m"
              limits:
                memory: "32Mi"
                cpu: "50m"
