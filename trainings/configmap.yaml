apiVersion: v1
kind: ConfigMap
metadata:
  name: trainings-config
data:
  PORT: "8080"
  LOG_LEVEL: "info"
  APP_BASE_URL: "https://drc-trainings.jshipster.io"
  ADMIN_USERNAME: "admin"
  OTP_TTL_MINUTES: "5"
  OTP_LENGTH: "6"
  OTP_RATE_WINDOW_SECONDS: "60"
  CANCELLATION_DEADLINE_HOURS: "24"
  NOTIFY_CHANNEL: "sms"
  TWILIO_SMS_FROM: "DRC"
  TWILIO_WHATSAPP_FROM: ""
  GROW_BASE_URL: "https://secure.meshulam.co.il/api/light/server/1.0/"
  # Cloud (vector) Map ID for the location picker's AdvancedMarkerElement.
  # Create one: Google Cloud console → Google Maps Platform → Map Management →
  # Create Map ID (Map type: JavaScript, Vector). Not secret. Empty = the picker
  # falls back to the classic marker.
  GOOGLE_MAPS_MAP_ID: "95c7ada0a2a54acc60517979"
